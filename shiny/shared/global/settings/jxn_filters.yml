    Alignment_Fail_Types:
        type: selectInput
        choices:
            - all_unfailed
            - any_unfailed
            - all_failed
            - any_failed
            - all_junctions
        value:
            - any_unfailed
    Junction_Fail_Types:
        type: selectInput
        choices:
            - all_unfailed
            - any_unfailed
            - all_failed
            - any_failed
            - all_junctions
        value:
            - any_unfailed
    Enforce_1N_Stem:
        type: checkboxInput
        value: TRUE
    Enforce_1N_to_2N_Size:
        type: checkboxInput
        value: FALSE
    Allow_Excluded_Regions:
        type: checkboxInput
        value: FALSE
    Allow_Alternative_Alignments:
        type: checkboxInput
        value: FALSE
