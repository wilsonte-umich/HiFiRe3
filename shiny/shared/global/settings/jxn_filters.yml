# all default values are ~unfiltered, i.e, all SVs
#   alnOffset       = "character", # not integer since may be * (missing)
Junction_Filters:
    Min_Breakpoint_Coverage:
        type:   numericInput
        value:  0
        min:    0
        max:    10000
        step:   1
    One_End_In_Genome:
        type: textInput
        value: "any"
    Min_N_Samples:
        type:   numericInput
        value:  0
        min:    0
        max:    100
        step:   1
    Max_N_Samples:
        type:   numericInput
        value:  0
        min:    0
        max:    100
        step:   1
    Duplex_Read_Status:
        type: selectInput
        choices:
            - has_duplex_read
            - has_no_duplexes
            - show_all
        value: show_all
    Allow_Excluded_Regions:
        type: checkboxInput
        value: FALSE
