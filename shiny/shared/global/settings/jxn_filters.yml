    Min_Breakpoint_Coverage:
        type:   numericInput
        value:  0
        min:    0
        max:    10000
        step:   1
    Min_Map_Quality: # MAPQ
        type:   numericInput
        value:  0
        min:    0
        max:    60
        step:   5
    Max_Frac_Base_Differences: # DE tag
        type:   numericInput
        value:  1
        min:    0
        max:    1
        step:   0.025
    Min_Site_Distance:
        type:   numericInput
        value:  0
        min:    0
        max:    10000
        step:   100
    Is_Expected_SV:
        type: checkboxGroupInput
        choices:
            - expected
            - unexpected
        value:
            - expected
            - unexpected
        inline: TRUE
    One_End_In_Genome:
        type: textInput
        value: "any"
