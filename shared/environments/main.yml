---
# programs used across many pipelines and actions
# built once for convenience
# versions current as of September 2025
dependencies:

  # general read and genome handling
    - samtools=1.22
    - minimap2=2.30
    - bedtools=2.31
    - fastp=1.0

  # R and its packages
    - r-base=4.4
    - r-essentials=4.4
    - r-r.utils=2.13

  # for orthogonal validation of chimeras
    - blast=2.17
