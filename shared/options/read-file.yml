---
# options that set the path to the input read files for alignment
options:
    read-file-dir: 
        order: 1
        short: i
        type: string
        required: false
        default: null
        directory:
            must-exist: false # since might still need to be created by a basecaller
        description: "directory with one or more FASTQ or (un)aligned BAM/CRAM files with required tags [TASK_DIR/ubam]"
    read-file-prefix: 
        order: 2
        short: x
        type: string
        required: false
        default: null
        description: "file name prefix identifying files in --read-file-dir to align [use all files]"
    read-number-format: 
        order: 3
        short: n
        type: string
        required: false
        default: _Rx_
        description: "portion of file name that identifies paired read files ('x' is replaced with 1 or 2)"
