---
options:
    sequencing-platform: 
        order: 1
        short: P
        type: string
        required: true
        default: null
        description: "platform used to sequence long reads (PacBio|ONT)" 
    min-selected-size: 
        order: 2
        short: I
        type: integer
        required: true
        default: null
        description: "smallest insert in bp selected BEFORE adapter ligation; max selected size must be twice --min-selected-size"
    selected-size-cv: 
        order: 3
        short: V
        type: double
        required: false
        default: 0.15
        description: "estimated coefficient of variation for --min-selected-size used to calculate min-allowed-size and max-allowed-size"
