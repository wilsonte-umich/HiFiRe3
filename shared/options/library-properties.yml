---
options:
    sequencing-platform: 
        order: 1
        short: P
        type: string
        required: true
        default: null
        description: "platform used to sequence reads (Illumina_2x150|Aviti_2x150|Aviti_1x300|Ultima|ONT|PacBioMolecule|PacBioStrand)" 
    library-type: 
        order: 2
        short: L
        type: string
        required: true
        default: null
        description: "how inserts were prepared for --sequencing-platform (Nextera|TruSeq|Elevate|Solaris|Ligation|Rapid|HiFi)" 
    min-selected-size: 
        order: 3
        short: I
        type: integer
        required: false
        default: 0
        description: "smallest insert in bp selected BEFORE adapter ligation"
    selected-size-cv: 
        order: 4
        short: V
        type: double
        required: false
        default: 0.15
        description: "estimated coefficient of variation for --min-selected-size used to calculate min-allowed-size and max-allowed-size"
    min-allowed-size:
        order: 5
        short: z
        type: integer
        required: false
        default: 0 # if both --min-allowed-size and --min-selected-size are zero, no size filtering is performed
        description: "use this value for min-allowed-size instead of calculating from --min-selected-size and --selected-size-cv"
