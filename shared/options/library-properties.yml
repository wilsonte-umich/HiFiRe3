---
options:
    sequencing-platform: 
        order: 1
        short: P
        type: string
        required: true
        default: null
        description: "platform used to sequence long reads (PacBio|ONT)" 
    min-selected-size: 
        order: 2
        short: I
        type: integer
        required: false
        default: 0
        description: "smallest insert in bp selected BEFORE adapter ligation"
    selected-size-cv: 
        order: 3
        short: V
        type: double
        required: false
        default: 0.15
        description: "estimated coefficient of variation for --min-selected-size used to calculate min-allowed-size and max-allowed-size"
    min-allowed-size:
        order: 4
        short: z
        type: integer
        required: false
        default: 0
        description: "use this value for min-allowed-size, instead of calculating from --min-selected-size and --selected-size-cv"
