---
options:
    min-rflp-evidence: # default pathway scores RFLP sites for this one sample unless --enzyme-name is NA
        order: 1
        short: S
        type: integer
        required: false
        default: 3
        description: "locate genome positions matching this many read outer endpoints as RFLP sites"
    skip-rflp-detection: # setting --skip-rflp-detection reverts to in silico sites only unless site-override-file is provided
        order: 2
        short: X
        type: boolean
        required: false
        default: false
        description: "do not locate non-reference RFLP sites, use in silico RE sites only"
    site-override-file: # user override has highest precedence 
        order: 3
        short: o
        type: string
        required: false
        default: NA
        description: "do not locate RFLP sites, use RE filtering sites from --site-override-file"
