---
# options that determine the behavior of alignment algorithms
options:
    bandwidth:
        order: 1
        short: b
        type: string
        required: false
        default: 500;3300
        description: "bandwidth for chaining and base alignment, same as minimap2 -r"
    force-alignment:
        order: 2
        short: F
        type: boolean
        required: false
        default: false
        description: "force read alignment, even if alignment bam file already exists"
