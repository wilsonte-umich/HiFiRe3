---
# options that set the path to the input read files for alignment
options:
    compare-project-dir: 
        order: 1
        short: P
        type: string
        required: false
        default: null
        description: "directory with multiple sample-level subfolders whose `analyze` pipeline files will be compared [TASK_DIR]"
    compare-sample-dirs: 
        order: 2
        short: S
        type: string
        required: false
        default: null
        description: "override --project-dir with a comma-delimited list of `analyze` output directories [--compare-project-dir/*]"
