---
options:
    genome: 
        order: 1
        short: g
        type: string
        required: false
        default: hs1
        description: "UCSC-compatible name of the reference genome to prepare (e.g., hg38)"
    genomes-dir:
        order: 2
        short: G
        type: string
        required: false
        default: ${MDI_DIR}/resources/genomes
        directory:
            must-exist: TRUE
        description: "directory to be filled with sub-directories, one per reference genome"
