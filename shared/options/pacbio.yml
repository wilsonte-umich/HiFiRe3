---
# options that set the path to the input PacBio strand-specific files for final basecalling
options:
    hifi-bam-file: 
        order: 1
        short: H
        type: string
        required: true
        default: null
        description: "path to a PacBio BAM file with hifi reads generated in by-strand mode"
    fail-bam-file: 
        order: 2
        short: F
        type: string
        required: true
        default: null
        description: "path to a PacBio BAM file with fail reads generated in by-strand mode"
    force-basecalling: 
        order: 3
        short: X
        type: boolean
        required: false
        default: false
        description: "force basecalling of all reads, ignoring any existing ubam files"
