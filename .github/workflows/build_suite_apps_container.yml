# MDI GitHub Continuous Integration Action to build 
# a suite-level Singularity/Apptainer apps container image
# an push it to the GitHub Packages container registry

name: build apps container
on:
  # trigger on the first tags of a major or minor release, but not patch releases (e.g., v1.2.0 but not v1.2.1)
  push:
    tags: [ 'v[0-9]+.[0-9]+.0' ] # MDI repos expect v.#.#.# as semantic versions

permissions:
  contents: read
  packages: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    env:
      RUN_COMMAND: hf3 # or the suite short name if ./run was renamed
      R_VERSION:   latest # or a specific version of R, e.g., 4.5 or 4.5.3

    steps:
      # checkout this tool suite
      - uses: actions/checkout@v6

      - name: Install Singularity/Apptainer
        uses: eWaterCycle/setup-apptainer@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # initial SKIP_MDI_APPS_INSTALL applies to the runner environment, not the apps container
      - name: Install MDI and build container image
        run: |
          export SKIP_MDI_APPS_INSTALL=1
          export FORCE_CONTAINER_BUILD=1
          export IS_GITHUB_ACTION=1
          ./install.sh --yes
          ./$RUN_COMMAND build --suite ${{ github.repository }} --container-type apps

      - name: Push container image to registry
        run: |
          SUITE_NAME=${{ github.repository }}
          SUITE_NAME=${SUITE_NAME#*/}
          LC_SUITE_NAME=${SUITE_NAME,,}
          CONTAINER_NAME=${LC_SUITE_NAME}-apps
          VERSION_TAG=${{ github.ref_name }}
          MAJOR_MINOR_VERSION=${VERSION_TAG%.*}
          SIF_FILE=./mdi/containers/${LC_SUITE_NAME}/${CONTAINER_NAME}-${MAJOR_MINOR_VERSION}.sif
          URI=oras://ghcr.io/${{ github.repository_owner }}/${CONTAINER_NAME}:${MAJOR_MINOR_VERSION}
          echo "SIF_FILE: "$SIF_FILE
          echo "ORAS URI: "$URI
          singularity push ${SIF_FILE} ${URI}
