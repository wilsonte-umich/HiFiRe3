---
pipeline:
    name: genome
    description: "Perform one-time preparative actions on genomes prior to data analysis"
    version: v0.0.1
actions:
    _global:
        environment: hf3Main
        condaFamilies:
            - base
            - main
    download:
        order: 1
        optionFamilies:
            - download-genome
        resources:
            required:
                total-ram: 8G
            recommended: 
                n-cpu: 1
                ram-per-cpu: 8G
        job-manager:
            recommended:
                time-limit: 4:00:00
        description: "download a reference genome and metadata files to maximize pipeline feature support"
    concatenate:
        order: 2
        optionFamilies:
            - concatenate-genomes
        resources:
            required:
                total-ram: 8G
            recommended: 
                n-cpu: 1
                ram-per-cpu: 8G
        job-manager:
            recommended:
                time-limit: 4:00:00
        description: "concatenate two reference genomes for use with mixed-species samples"
    digest:
        order: 3
        optionFamilies:
            - genome
            - digestion
        resources:
            required:
                total-ram: 8G
            recommended: 
                n-cpu: 1
                ram-per-cpu: 8G
        job-manager:
            recommended:
                time-limit: 12:00:00
        description: "digest a genome in silico with blunt restriction enzymes to assess product fragment sizes"
package:
    digest: # the pipeline action after which a data package should assembled
        uploadType: hf3Digestion # a signal to the Stage 2 framework regarding the package contents
        files:
            summariesFile:
                type: rds
                file: $GENOME_PREFIX.RE_site_summaries.rds
            distributionsFile:
                type: rds
                file: $GENOME_PREFIX.RE_distributions.rds
