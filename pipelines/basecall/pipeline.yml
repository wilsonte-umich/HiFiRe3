---
pipeline:
    name: basecall
    description: "Perform basecalling on input read data from the sequencing platform"
    version: v0.0.1
actions:
    _global:
        environment: hf3Main
        condaFamilies:
            - base
            - main
    PacBio:
        order: 1
        optionFamilies:
            - pacbio
            - genome
        resources:
            required:
                total-ram: 32G
            recommended: 
                n-cpu: 8
                ram-per-cpu: 4G
        job-manager:
            recommended:
                time-limit: 24:00:00
        description: "derive a read consensus from PacBio strand consensuses generated in by-strand mode"
    ONT:
        order: 2
        optionFamilies:
            - library-properties
            - restriction-enzyme # used to assist adapter trimming
            - pod5
            - dorado
        resources:
            required:
                total-ram: 64G
            recommended: 
                n-cpu: 8
                n-gpu: 2
                ram-per-cpu: 8G
        job-manager:
            recommended:
                partition: gpu
                time-limit: 48:00:00
        description: "use Dorado to basecall reads in ONT POD5 file(s), with RE-specific adapter trimming"
